services:
  # حاوية الأبلكيشن (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenvoyc_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .:/var/www/html
    networks:
      - caddy_net
      - internal_db

  # حاوية قاعدة البيانات
  db:
    image: mysql:8.0
    container_name: zenvoyc_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal_db

networks:
  caddy_net:
    external: true
  internal_db:
    driver: bridge

volumes:
  db_data:
